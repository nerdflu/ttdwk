<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Coming Soon - Things To Do With Kids</title>
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      background: #F1F0FE;
    }
    .coming-soon-card {
      max-width: 600px;
      background: #fff;
      padding: 40px;
      border-radius: 40px;
      box-shadow: 0 10px 30px rgba(64, 49, 160, 0.1);
    }
    h1 {
      color: #4031a0;
      font-size: 2rem;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    p {
      color: #555;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    .badge {
      display: inline-block;
      background: #eef;
      color: #4031a0;
      padding: 8px 20px;
      border-radius: 999px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="coming-soon-card">
    <h1>Fun places and little adventures for kids across Australia</h1>
    <p>ThingsToDoWithKids.com.au is getting ready to help families find hidden gems and fresh things to explore with kids.</p>
    <span class="badge">Launching soon</span>
  </div>
</body>
</html>
