title: Things To Do With Kids
url: https://thingstodowithkids.com.au
baseurl: ""
timezone: Australia/Brisbane
locale: en-AU
permalink: pretty
theme: ""

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown: { input: GFM }

collections:
  cities:
    output: true
    permalink: "/:name/"
  activities:
    output: true
    permalink: "/activities/:slug/"

defaults:
  - scope: { path: "_cities" }
    values: { layout: city }
  - scope: { path: "_activities" }
    values: { layout: activity }

exclude:
  - vendor
  - .bundle
  - scripts
  - Gemfile
  - Gemfile.lock
  - PROJECT_PLAN.md
  - THEME_MAP.md
  - .gitignore
  - category_pages
  - _site
