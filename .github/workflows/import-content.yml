name: Import Content from Google Sheets

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 10 * * *' # Run daily at 10 AM (UTC)

permissions:
  contents: write

jobs:
  import-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync and Build
        run: npm run sync:build
        env:
          CITIES_CSV_URL: ${{ vars.CITIES_CSV_URL }}
          CATEGORIES_CSV_URL: ${{ vars.CATEGORIES_CSV_URL }}
          DISCOVERY_TAGS_CSV_URL: ${{ vars.DISCOVERY_TAGS_CSV_URL }}
          PLACES_CSV_URL: ${{ vars.PLACES_CSV_URL }}
          EVENTS_CSV_URL: ${{ vars.EVENTS_CSV_URL }}
          IDEAS_CSV_URL: ${{ vars.IDEAS_CSV_URL }}
          GUIDES_CSV_URL: ${{ vars.GUIDES_CSV_URL }}

      - name: Commit and Push Generated JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add src/data/generated/
          if git diff --staged --quiet; then
            echo "No changes in generated content."
          else
            git commit -m "chore(data): auto-update generated JSON from Google Sheets"
            git push
          fi
